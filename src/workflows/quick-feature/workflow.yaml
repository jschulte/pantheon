name: quick-feature
description: "Plan-to-implementation pipeline. Asks clarifying questions, then autonomously runs PRD → architecture → epics → sprint → stories → build."
author: "Jonah Schulte (leveraging BMAD Method)"
maturity: stable

# ============================================================================
# QUICK-FEATURE: Automated BMAD Planning Pipeline
# ============================================================================
# Purpose: Accept a plan (file or inline text), ask targeted clarifying
# questions, then autonomously run the entire BMM planning chain:
#   edit-prd → create-architecture → create-epics-and-stories →
#   sprint-planning → create-story → batch-stories
#
# Philosophy: Automate the "Sure, that looks good" approval messages.
# The document trail IS the value — we automate approvals, not thinking.
#
# User interaction: 2-3 stops total (depending on plan_input)
#   0. INTAKE (Phase 1, conditional): Plan entry prompt if plan_input is empty
#   1. CLARIFY (Phase 2): 1-3 batched AskUserQuestion calls
#   2. POST-EPICS (Phase 5): Epic selection + build mode
# Everything else is autonomous once the plan has been captured.
#
# Usage:
#   /quick-feature plan="path/to/plan.md"
#   /quick-feature plan="Add user authentication with OAuth2"
#   /quick-feature                          # Will prompt for plan
# ============================================================================

# Critical variables from config
config_source: "{project-root}/_bmad/pantheon/config.yaml"
output_folder: "{project-root}/_bmad-output"
communication_language: "{config_source}:communication_language"
date: system-generated

# Artifact directories
planning_artifacts: "{output_folder}/planning-artifacts"
implementation_artifacts: "{output_folder}/implementation-artifacts"

# Workflow paths
installed_path: "{project-root}/_bmad/pantheon/workflows/quick-feature"
instructions: "{installed_path}/workflow.md"

# BMM workflow paths (referenced by sub-agents)
bmm_workflows:
  edit_prd: "{project-root}/_bmad/bmm/workflows/2-plan-workflows/create-prd/workflow-edit-prd.md"
  create_prd: "{project-root}/_bmad/bmm/workflows/2-plan-workflows/create-prd/workflow-create-prd.md"
  create_architecture: "{project-root}/_bmad/bmm/workflows/3-solutioning/create-architecture/workflow.md"
  create_epics_and_stories: "{project-root}/_bmad/bmm/workflows/3-solutioning/create-epics-and-stories/workflow.md"
  sprint_planning: "{project-root}/_bmad/bmm/workflows/4-implementation/sprint-planning/workflow.yaml"
  create_story: "{project-root}/_bmad/bmm/workflows/4-implementation/create-story/instructions.xml"

# BMM config (passed to sub-agents for their own resolution)
bmm_config: "{project-root}/_bmad/bmm/config.yaml"

# Input variables
plan_input: ""              # Required: file path or inline text
prd_mode: "auto"            # auto | edit | create — auto detects from existing artifacts
skip_architecture: false    # If true AND architecture.md exists, skip Phase 4

# Sub-agent configuration
sub_agent:
  yolo_directive: |
    CRITICAL EXECUTION DIRECTIVE: You are running in YOLO mode.
    - At EVERY menu prompt, select [c] Continue (or [y] YOLO if offered)
    - Do NOT wait for user input at any checkpoint
    - Do NOT ask for confirmation — auto-approve all decisions
    - Complete the ENTIRE workflow from start to finish without stopping
    - If a step has multiple options, choose the most comprehensive/complete option
    - If asked to review output, approve it and continue
  timeout_per_phase: 1800   # 30 minutes max per BMM workflow phase
  model: "opus"

# Story validation settings
story_validation:
  min_file_size_bytes: 10240  # 10KB minimum
  required_sections:
    - "Business Context"
    - "Acceptance Criteria"
    - "Tasks"
    - "Dev Agent Guardrails"
    - "Technical Requirements"
    - "Testing Requirements"
    - "Current State"
    - "Story Metadata"
    - "Dependencies"
    - "Performance Requirements"
    - "Security Requirements"
    - "Error Handling"
  max_retries: 2

# Phases
phases:
  - phase-1-intake
  - phase-2-clarify
  - phase-3-prd
  - phase-4-architecture
  - phase-5-epics
  - phase-6-sprint
  - phase-7-stories
  - phase-8-build

standalone: true
web_bundle: false
