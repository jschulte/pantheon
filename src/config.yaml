# Pantheon Configuration — _bmad/pantheon/config.yaml
# Ships with good defaults. Modify to match your project's needs.
# On reinstall/upgrade, the installer preserves your customizations.

# General
user_name: ""
communication_language: "en"

# Artifact locations (relative to project root)
planning_artifacts: "docs/planning"
implementation_artifacts: "docs/implementation"
output_folder: "_bmad-output"

# Pantheon pipeline settings
pantheon:
  coverage_threshold: 80          # Minimum test coverage %
  require_code_citations: true    # file:line evidence required
  enable_playbooks: true          # Compound learning system
  bootstrap_mode: true            # Auto-init playbooks from codebase
  enable_batch_processing: true
  parallel_config:
    max_concurrent: 3             # Stories per wave
    smart_ordering: true          # Auto-detect dependencies
    worktree_deps: symlink        # symlink (default) | install — symlink reuses main repo's node_modules
  use_consolidated_review: "auto" # Complexity-based routing
  deferred_issues:
    tracking_method: "tracked_issues_file"  # "tracked_issues_file" | "github_issues" | "local_file"
    tracked_issues_file:
      path: "tracked-issues.json"         # Relative to sprint_artifacts
    github_issues:
      labels: ["tech-debt", "should-fix", "code-health"]
      assignee: null                    # Optional: auto-assign to someone
      project: null                     # Optional: add to a GitHub project
    local_file:
      path: "KNOWN_ISSUES.md"          # Relative to project root
      append_mode: true                 # Append new items (don't overwrite)

# External tracker integration
# Set provider to "rally", "github-issues", or "none" (default)
# Per-developer overrides (rally.owner) go in config.local.yaml (gitignored)
# MCP availability is auto-detected at runtime — no manual toggle needed
tracker:
  provider: none                   # none = all sync is silent no-op, zero overhead
  main_branch: main                # only this branch can push Released/planning statuses
  rally:
    project: auto                  # auto-detect or explicit Rally project name
    epic_id: null                  # scope to Rally Epic (E1234) — limits Feature discovery
    tag_filter: null               # only sync items with this Rally tag
    owner: ""                      # Rally display name for story assignment (e.g., "Jonah Schulte")
  status_mapping:                  # BMAD status → Rally scheduleState (override defaults)
    backlog: Idea
    ready-for-dev: Defined
    in-progress: In-Progress
    review: Completed
    done: Accepted
